<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send a WhisprMask</title>
    <meta name="description" content="Send an anonymous message. They won't know it's you.">
    <!-- Open Graph for WhatsApp/Social Media Previews -->
    <meta property="og:title" content="WhisprMask - Anonymous Messages">
    <meta property="og:description" content="Send a secret message anonymously via WhisprMask!">
    <meta property="og:image" content="https://YOUR_DOMAIN.com/img/logo.png">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="style.css">
  <script src="anti-copy.js"></script>
</head>
<body>
    <!-- Navbar Menu -->
    <div class="navbar">
        <div class="navbar-brand">
            <img src="logo.png" alt="WhisprMask Logo">
            WhisprMask
        </div>
        <div class="navbar-menu">
            <a href="index.html?new=1" data-i18n="nav.create_link">Create Your Link</a>
        </div>
    </div>

    <div class="container">
        <!-- Send Message Form -->
        <form id="send-form">
            <h2 data-i18n="send.title">Send a WhisprMask to</h2>
            <h1 id="target-username" style="color: var(--primary);">...</h1>
            <div id="topic-badge-wrap"></div>
            
            <p style="margin-top:20px; font-weight:bold; color:var(--text-muted); font-size:0.9rem;" data-i18n="send.mood">Pick a Mood Vibe (Optional)</p>
            <div class="mood-selector" id="mood-selector">
                <button type="button" class="mood-btn" data-mood="😎">😎</button>
                <button type="button" class="mood-btn" data-mood="💔">💔</button>
                <button type="button" class="mood-btn" data-mood="🤫">🤫</button>
                <button type="button" class="mood-btn" data-mood="💖">💖</button>
                <button type="button" class="mood-btn" data-mood="🔥">🔥</button>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <textarea id="message-input" placeholder="Type your anonymous message here..." required data-i18n-placeholder="send.placeholder"></textarea>
                    <button type="button" id="dice-btn" class="dice-btn" title="Random prompt">🎲</button>
                </div>
            </div>
            <button type="submit" id="send-btn" class="btn">
                <span id="send-btn-text" data-i18n="send.btn">Send anonymously</span>
                <div class="loader"></div>
            </button>
            <p style="margin-top: 20px; font-size: 0.8rem; color: var(--text-muted); font-weight: 600;" data-i18n="send.footer_note">100% encrypted & anonymous</p>
        </form>
    </div>

    <!-- Footer -->
    <div class="footer">
        <span data-i18n="footer.rights">&copy; 2026 WhisprMask - All rights reserved.</span><br>
        <span data-i18n="footer.dev">Developed by SukaCoding</span>
    </div>

    <!-- Load App Logic as Module -->
    <script type="module" src="app.js?v=2"></script>
    <script type="module" src="premium.js?v=2"></script>
</body>
</html>
