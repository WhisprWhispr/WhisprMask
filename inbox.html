<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox - WhisprMask</title>
    <meta name="description" content="Your anonymous messages inbox.">
    <link rel="stylesheet" href="style.css">
    <!-- html2canvas for capturing messages -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="anti-copy.js"></script>
</head>
<body>
    <a href="index.html" class="back-link" data-i18n="nav.back">← Back</a>
    <div class="container" style="max-width: 500px;">
        <h2 data-i18n="inbox.title">Your Inbox</h2>
        <h3 id="inbox-username" style="color: var(--text-muted); font-size: 1rem; margin-top: -10px; margin-bottom: 30px;">...</h3>
        
        <div id="message-list" class="message-list">
            <!-- Messages will load here -->
        </div>
    </div>

    <!-- Share Modal -->
    <div id="share-modal" class="modal hide">
        <div class="modal-content">
            <span class="close-modal" id="close-modal">&times;</span>
            <h3 data-i18n="inbox.modal_title">Share to Story 📸</h3>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px;" data-i18n="inbox.modal_desc">Tap and hold the image to save, or click Download.</p>
            <div id="canvas-preview-container"></div>
            <button id="download-img-btn" class="btn" style="margin-top: 15px;" data-i18n="inbox.modal_btn">Download Image</button>
        </div>
    </div>

    <!-- Hidden Export Template (for html2canvas) -->
    <div id="export-template" class="export-container hide" style="width: 1080px; height: 1920px; position: absolute; left: -9999px; top: -9999px;">
        <div class="export-bg">
            <div class="export-card">
                <div class="export-mood" id="export-mood"></div>
                <div class="export-text" id="export-text"></div>
                <div class="export-time" id="export-time"></div>
            </div>
            <div class="export-watermark">
                <img src="logo.png" style="width: 60px; height: 60px; border-radius: 15px; margin-bottom:10px;">
                <h2 data-i18n="inbox.watermark">Send me anonymous messages on WhisprMask!</h2>
                <h3 id="export-username"></h3>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <span data-i18n="footer.rights">&copy; 2026 WhisprMask - All rights reserved.</span> <br>
        <span data-i18n="footer.dev">Developed by SukaCoding</span><br><br>
        <a href="settings.html" data-i18n="nav.settings">⚙️ Settings</a>
    </div>

    <!-- Load App Logic as Module -->
    <script type="module" src="app.js?v=2"></script>
    <script type="module" src="premium.js?v=2"></script>
</body>
</html>
